name: Sync Registry Artifacts

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: registry-sync-main
  cancel-in-progress: false

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build registry artifacts
        run: npm run registry:build

      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/r

          if git diff --cached --quiet; then
            echo "No registry changes to commit."
            exit 0
          fi

          git commit -m "chore: sync registry artifacts"
          git push origin HEAD:main
